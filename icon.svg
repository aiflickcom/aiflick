<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 배경: 라운드 사각형 + 그라데이션 -->
  <rect width="512" height="512" rx="112" fill="#0a0a0e"/>
  <rect width="512" height="512" rx="112" fill="url(#bg)" opacity="0.92"/>

  <!-- 미세한 그리드 텍스처 (브랜드 톤) -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- AI 텍스트 (Orbitron 느낌의 굵은 영문) -->
  <text x="256" y="290"
        font-family="Orbitron, Impact, sans-serif"
        font-weight="900"
        font-size="200"
        letter-spacing="8"
        fill="url(#text)"
        text-anchor="middle"
        filter="url(#glow)">AI</text>

  <!-- 아래에 작은 FLICK 텍스트 -->
  <text x="256" y="370"
        font-family="Orbitron, sans-serif"
        font-weight="700"
        font-size="46"
        letter-spacing="12"
        fill="#ffffff"
        opacity="0.85"
        text-anchor="middle">FLICK</text>

  <!-- 우상단 작은 강조 점 (브랜드 액센트) -->
  <circle cx="436" cy="76" r="14" fill="#06b6d4" opacity="0.9"/>
</svg>
