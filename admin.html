<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AIFLICK / admin</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#a855f7">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Orbitron:wght@700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #060608;
      --surface: #0d0d12;
      --card: #11111a;
      --card2: #18181f;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --accent: #a855f7;
      --accent2: #06b6d4;
      --accent3: #f59e0b;
      --glow: rgba(168,85,247,0.4);
      --glow2: rgba(6,182,212,0.4);
      --text: #f1f0ff;
      --muted: #6b6b80;
      --muted2: #9999aa;
      --success: #34d399;
      --danger: #f87171;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(168,85,247,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(168,85,247,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }

    /* HEADER */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(6,6,8,0.85);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }
    .breadcrumb { display: flex; align-items: center; gap: 10px; }
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px; font-weight: 900; letter-spacing: 3px;
      background: linear-gradient(135deg, #a855f7 0%, #06b6d4 50%, #a855f7 100%);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer { to { background-position: 200% center; } }
    .bc-sep { color: var(--muted); font-weight: 300; font-size: 18px; }
    .bc-mode {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: 3px;
      color: var(--text); text-transform: uppercase;
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .btn {
      background: transparent; border: 1px solid var(--border2);
      color: var(--muted2); padding: 7px 14px;
      border-radius: 20px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px var(--glow); }
    .btn.danger:hover { border-color: var(--danger); color: var(--danger); box-shadow: 0 0 10px rgba(248,113,113,0.3); }
    .user-email { font-size: 12px; color: var(--muted); font-family: monospace; }

    /* CONTAINER */
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 20px 80px; position: relative; z-index: 1; }

    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted2);
      margin: 32px 0 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .section-title:first-child { margin-top: 0; }
    .section-title .accent {
      background: linear-gradient(135deg, #a855f7, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* STATS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 18px;
      text-align: center;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .stat-card:hover {
      border-color: rgba(168,85,247,0.3);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.4), 0 0 18px rgba(168,85,247,0.1);
    }
    .stat-number {
      font-family: 'Orbitron', sans-serif;
      font-size: 36px; font-weight: 900; letter-spacing: 1px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1.1;
    }
    .stat-label {
      font-size: 11px; color: var(--muted2);
      margin-top: 8px; letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* TYPE BREAKDOWN */
    .type-breakdown {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      margin-top: 12px;
    }
    .type-stat {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .type-stat .lbl {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      color: var(--muted2);
    }
    .type-stat .num { font-size: 18px; font-weight: 700; color: var(--text); font-family: 'Space Grotesk', monospace; }
    .type-stat.flick .lbl { color: var(--muted2); }
    .type-stat.guess .lbl { color: var(--accent2); }
    .type-stat.talk .lbl { color: var(--accent); }

    /* MAKE FORM */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .make-type-tabs { display: flex; gap: 6px; margin-bottom: 18px; }
    .make-type-tab {
      flex: 1; background: var(--card2);
      border: 1px solid var(--border);
      color: var(--muted2); padding: 10px;
      border-radius: 10px; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      letter-spacing: 1px;
    }
    .make-type-tab:hover { border-color: var(--accent); color: var(--accent); }
    .make-type-tab.active {
      background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(6,182,212,0.2));
      border-color: var(--accent); color: var(--text);
    }
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 12px; color: var(--muted2);
      margin-bottom: 6px; font-weight: 600;
    }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px; color: var(--text);
      font-family: inherit; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(168,85,247,0.2);
    }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--muted); }
    .form-textarea { min-height: 140px; resize: vertical; line-height: 1.6; }
    .form-select { cursor: pointer; }

    .upload-type-row { display: flex; gap: 6px; margin-bottom: 12px; }
    .upload-type-btn {
      flex: 1; background: var(--card2);
      border: 1px solid var(--border);
      color: var(--muted2); padding: 8px;
      border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .upload-type-btn.active {
      background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(6,182,212,0.2));
      border-color: var(--accent); color: var(--text);
    }

    .yt-preview { margin-top: 8px; }
    .yt-preview img {
      width: 100%; max-width: 280px;
      border-radius: 8px; border: 1px solid var(--border);
    }

    .progress-wrap { margin-top: 8px; }
    .progress-meta { font-size: 12px; color: var(--muted2); margin-bottom: 4px; font-weight: 600; }
    .progress-bar-bg { background: var(--card2); border-radius: 4px; height: 5px; border: 1px solid var(--border); overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, var(--accent), var(--accent2)); height: 100%; border-radius: 4px; width: 0%; transition: width 0.3s; }

    .guess-toggle {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }
    .guess-toggle-row {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--text); font-weight: 600;
      cursor: pointer; user-select: none;
    }
    .guess-toggle-row input { accent-color: var(--accent); cursor: pointer; }
    .guess-toggle-desc { font-size: 11px; color: var(--muted); margin-top: 4px; padding-left: 26px; line-height: 1.5; }
    .guess-answer-row {
      display: none; margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--border);
      align-items: center; gap: 10px;
    }
    .guess-answer-row.show { display: flex; }

    .btn-primary {
      width: 100%; padding: 12px 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      color: white; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 4px 18px var(--glow); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    .alert {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      display: none;
    }
    .alert.show { display: block; }
    .alert-success {
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.3);
      color: var(--success);
    }
    .alert-error {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--danger);
    }

    /* FILTER */
    .post-filters {
      display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted2);
      padding: 5px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(6,182,212,0.2));
      border-color: var(--accent); color: var(--text);
    }

    /* POSTS TABLE */
    .posts-table {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .table-header {
      display: grid;
      grid-template-columns: 1fr 90px 90px 90px 80px;
      padding: 12px 18px;
      background: var(--card2);
      font-family: 'Orbitron', sans-serif;
      font-size: 11px; color: var(--muted);
      font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .table-row {
      display: grid;
      grid-template-columns: 1fr 90px 90px 90px 80px;
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      align-items: center;
      transition: background 0.15s;
      gap: 8px;
    }
    .table-row:hover { background: var(--card2); }
    .post-title-cell {
      font-size: 13px; font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .type-tag {
      display: inline-block;
      font-family: 'Orbitron', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
      padding: 3px 8px; border-radius: 4px;
    }
    .type-tag.flick { background: rgba(255,255,255,0.06); color: var(--muted2); border: 1px solid var(--border2); }
    .type-tag.guess { background: rgba(6,182,212,0.15); color: var(--accent2); border: 1px solid rgba(6,182,212,0.3); }
    .type-tag.talk { background: rgba(168,85,247,0.15); color: var(--accent); border: 1px solid rgba(168,85,247,0.3); }
    .type-tag.image { background: rgba(245,158,11,0.15); color: var(--accent3); border: 1px solid rgba(245,158,11,0.3); }
    .type-stat.image .lbl { color: var(--accent3); }
    .answer-tag {
      font-family: 'Space Grotesk', monospace;
      font-size: 11px; font-weight: 700;
      padding: 2px 7px; border-radius: 4px;
    }
    .answer-tag.ai { background: rgba(6,182,212,0.15); color: var(--accent2); }
    .answer-tag.real { background: rgba(168,85,247,0.15); color: var(--accent); }
    .post-date-cell { font-size: 11px; color: var(--muted); font-family: monospace; }
    .delete-btn {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted);
      padding: 5px 10px; border-radius: 6px;
      font-size: 11px; cursor: pointer; font-family: inherit;
      transition: all 0.2s;
    }
    .delete-btn:hover {
      border-color: var(--danger); color: var(--danger);
    }
    .empty-posts {
      padding: 60px 20px; text-align: center;
      color: var(--muted); font-size: 13px;
    }

    /* AUTH GATE */
    .auth-gate {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; position: relative; z-index: 1;
    }
    .auth-gate.hide { display: none; }
    .auth-box {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 44px 36px;
      width: 100%; max-width: 420px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 40px rgba(168,85,247,0.15);
    }
    .auth-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px; font-weight: 900; letter-spacing: 4px;
      background: linear-gradient(135deg, #a855f7, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .auth-sub {
      color: var(--muted2); font-size: 13px;
      letter-spacing: 2px; font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      margin-bottom: 28px;
    }
    .auth-msg { color: var(--muted2); font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
    .google-btn {
      width: 100%; background: white; border: none; border-radius: 12px;
      padding: 13px 20px; font-size: 14px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      color: #1a1a1a; transition: all 0.2s; font-family: inherit;
    }
    .google-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
    .auth-back {
      display: inline-block; margin-top: 16px;
      font-size: 12px; color: var(--muted);
      cursor: pointer;
    }
    .auth-back:hover { color: var(--text); }

    /* admin-wrap initially hidden */
    #admin-wrap { display: none; }
    #admin-wrap.show { display: block; }

    @media (max-width: 700px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .type-breakdown { grid-template-columns: 1fr; }
      .table-header, .table-row {
        grid-template-columns: 1fr 80px 70px;
        gap: 6px;
      }
      .table-header > div:nth-child(3),
      .table-row > div:nth-child(3),
      .table-header > div:nth-child(4),
      .table-row > div:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

<!-- AUTH GATE (Google 로그인 안 됐거나 admin 아닌 경우) -->
<div class="auth-gate" id="auth-gate">
  <div class="auth-box">
    <div class="auth-logo">AIFLICK</div>
    <div class="auth-sub">/ ADMIN</div>
    <div class="auth-msg" id="auth-msg">관리자 페이지에 접근하려면 Google로 로그인해주세요.</div>
    <button class="google-btn" id="google-btn" onclick="loginWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Google로 로그인
    </button>
    <a class="auth-back" href="index.html">← 사이트로 돌아가기</a>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-wrap">
  <header>
    <div class="breadcrumb">
      <a class="logo" href="index.html">AIFLICK</a>
      <span class="bc-sep">/</span>
      <span class="bc-mode">admin</span>
    </div>
    <div class="header-right">
      <span class="user-email" id="user-email"></span>
      <a class="btn" href="index.html">← 사이트</a>
      <button class="btn danger" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <div class="container">

    <!-- 전체 통계 -->
    <div class="section-title">통계 <span class="accent">stats</span></div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="stat-posts">0</div>
        <div class="stat-label">총 포스트</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-votes">0</div>
        <div class="stat-label">투표</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-reactions">0</div>
        <div class="stat-label">리액션</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-comments">0</div>
        <div class="stat-label">댓글</div>
      </div>
    </div>
    <div class="type-breakdown">
      <div class="type-stat flick"><span class="lbl">FLICK</span><span class="num" id="stat-flick">0</span></div>
      <div class="type-stat guess"><span class="lbl">GUESS</span><span class="num" id="stat-guess">0</span></div>
      <div class="type-stat image"><span class="lbl">IMAGE</span><span class="num" id="stat-image">0</span></div>
      <div class="type-stat talk"><span class="lbl">TALK</span><span class="num" id="stat-talk">0</span></div>
    </div>

    <!-- + Make -->
    <div class="section-title">+ Make</div>
    <div class="form-card">
      <div class="make-type-tabs">
        <button class="make-type-tab active" id="m-tab-video" onclick="setMakeType('video')">영상</button>
        <button class="make-type-tab" id="m-tab-image" onclick="setMakeType('image')">사진</button>
        <button class="make-type-tab" id="m-tab-text" onclick="setMakeType('text')">글 (Talk)</button>
      </div>

      <!-- 영상 -->
      <div id="make-video-section">
        <div class="upload-type-row">
          <button class="upload-type-btn active" id="u-type-youtube" onclick="setUploadType('youtube')">🔗 YouTube URL</button>
          <button class="upload-type-btn" id="u-type-file" onclick="setUploadType('file')">📁 파일 업로드</button>
        </div>

        <div id="u-youtube-section">
          <div class="form-group">
            <label class="form-label">YouTube URL *</label>
            <input class="form-input" type="url" id="u-video-url" placeholder="https://www.youtube.com/watch?v=..." oninput="previewYoutube(this.value)">
            <div class="yt-preview" id="u-yt-preview" style="display:none;"><img id="u-yt-thumb" src=""></div>
          </div>
        </div>
        <div id="u-file-section" style="display:none;">
          <div class="form-group">
            <label class="form-label">영상 파일 * (최대 50MB)</label>
            <input class="form-input" type="file" id="u-video-file" accept="video/mp4,video/webm,video/quicktime" onchange="previewFile(this)">
            <div id="u-file-preview" style="font-size:12px;color:var(--muted);margin-top:5px;"></div>
            <div class="progress-wrap" id="u-progress-wrap" style="display:none;">

    <!-- 포스트 목록 -->

<script>
  const SUPABASE_URL = 'https://nhjnotsgolywogbvzisz.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oam5vdHNnb2x5d29nYnZ6aXN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTk1ODUsImV4cCI6MjA5MDQzNTU4NX0.xaoVp6C0POxLCIk3bnjYYHxuSzRBdh__gc_RkfoFjN8';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;
  let allPosts = [];
  let currentFilter = 'all';
  let makeType = 'video';
  let uploadType = 'youtube';

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  function getYouTubeId(url) {
    if (!url) return null;
    const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([^&\n?#]+)/);
    return m ? m[1] : null;
  }
  function getPostType(post) {
    if (post.post_type) return post.post_type;
    if (!post.video_url && post.body) return 'talk';
    if (post.category === 'guess' || post.category === 'lab') return 'guess';
    return 'flick';
  }
  function getMediaType(post) {
    if (post.media_type) return post.media_type;
    if (!post.video_url && post.body) return 'text';
    if (post.video_url && /\.(jpg|jpeg|png|webp|gif)(\?|$)/i.test(post.video_url)) return 'image';
    return 'video';
  }

  // ── AUTH ──
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      const { data: profile } = await sb.from('profiles').select('is_admin').eq('id', session.user.id).single();
      if (profile?.is_admin) {
        currentUser = session.user;
        showAdmin();
        return;
      } else {
        document.getElementById('auth-msg').innerHTML = '⚠️ 이 계정은 관리자 권한이 없어요.<br>다른 계정으로 로그인해주세요.';
      }
    }
    document.getElementById('auth-gate').classList.remove('hide');
  }

  async function loginWithGoogle() {
    await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
  }

  async function doLogout() {
    if (!confirm('로그아웃할까요?')) return;
    await sb.auth.signOut();
    location.href = 'index.html';
  }

  function showAdmin() {
    document.getElementById('auth-gate').classList.add('hide');
    document.getElementById('admin-wrap').classList.add('show');
    document.getElementById('user-email').textContent = currentUser.email;
    loadAll();
  }

  // ── 데이터 ──
  async function loadAll() {
    await Promise.all([loadStats(), loadPosts()]);
  }

  async function loadStats() {
    const [posts, votes, reactions, comments] = await Promise.all([
      sb.from('posts').select('id, post_type, category, body, video_url, media_type'),
      sb.from('votes').select('id', { count: 'exact', head: true }),
      sb.from('reactions').select('id', { count: 'exact', head: true }),
      sb.from('comments').select('id', { count: 'exact', head: true }),
    ]);
    const allP = posts.data || [];
    document.getElementById('stat-posts').textContent = allP.length;
    document.getElementById('stat-votes').textContent = votes.count || 0;
    document.getElementById('stat-reactions').textContent = reactions.count || 0;
    document.getElementById('stat-comments').textContent = comments.count || 0;
    // FLICK = video flick, GUESS = any guess type, IMAGE = image flick (non-guess), TALK = text
    document.getElementById('stat-flick').textContent = allP.filter(p => getPostType(p) === 'flick' && getMediaType(p) === 'video').length;
    document.getElementById('stat-guess').textContent = allP.filter(p => getPostType(p) === 'guess').length;
    const imgEl = document.getElementById('stat-image');
    if (imgEl) imgEl.textContent = allP.filter(p => getMediaType(p) === 'image' && getPostType(p) !== 'guess').length;
    document.getElementById('stat-talk').textContent = allP.filter(p => getPostType(p) === 'talk').length;
  }

  async function loadPosts() {
    const { data } = await sb.from('posts').select('*').order('created_at', { ascending: false });
    allPosts = data || [];
    renderPosts();
  }

  function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === filter);
    });
    renderPosts();
  }

  function renderPosts() {
    const list = document.getElementById('posts-list');
    let posts = allPosts;
    if (currentFilter === 'image') {
      posts = posts.filter(p => getMediaType(p) === 'image');
    } else if (currentFilter !== 'all') {
      posts = posts.filter(p => getPostType(p) === currentFilter);
    }

    if (!posts.length) {
      list.innerHTML = '<div class="empty-posts">포스트가 없어요</div>';
      return;
    }
    list.innerHTML = posts.map(post => {
      const type = getPostType(post);
      const media = getMediaType(post);
      // Tag: image media는 IMAGE로 표시 (post_type='guess' + image면 "GUESS · IMG"로)
      const typeLabel = (media === 'image' && type !== 'talk')
        ? (type === 'guess' ? 'GUESS · IMG' : 'IMAGE')
        : type.toUpperCase();
      const tagCls = (media === 'image' && type !== 'talk' && type !== 'guess') ? 'image' : type;
      const answer = post.correct_answer
        ? `<span class="answer-tag ${post.correct_answer}">${post.correct_answer === 'ai' ? 'AI' : 'REAL'}</span>`
        : '<span style="color:var(--muted);font-size:11px;">—</span>';
      return `
        <div class="table-row">
          <div class="post-title-cell" title="${escapeHtml(post.title || '')}">${escapeHtml(post.title || '')}</div>
          <div><span class="type-tag ${tagCls}">${typeLabel}</span></div>
          <div>${answer}</div>
          <div class="post-date-cell">${new Date(post.created_at).toLocaleDateString('ko-KR', { month:'2-digit', day:'2-digit' })}</div>
          <div><button class="delete-btn" onclick="deletePost('${post.id}', this)">삭제</button></div>
        </div>`;
    }).join('');
  }

  async function deletePost(id, btn) {
    if (!confirm('정말 삭제할까요? (관련 댓글/투표/리액션 함께 사라짐)')) return;
    btn.textContent = '삭제 중...';
    btn.disabled = true;
    // 관련 데이터도 같이 정리 (FK ON DELETE CASCADE 안 걸려있다면 수동)
    await Promise.all([
      sb.from('comments').delete().eq('post_id', id),
      sb.from('votes').delete().eq('post_id', id),
      sb.from('reactions').delete().eq('post_id', id),
    ]);
    await sb.from('posts').delete().eq('id', id);
    loadAll();
  }

  // ── MAKE 폼 ──
  function setMakeType(type) {
    makeType = type;
    ['video', 'image', 'text'].forEach(t => {
      const tab = document.getElementById('m-tab-' + t);
      const section = document.getElementById('make-' + t + '-section');
      if (tab) tab.classList.toggle('active', type === t);
      if (section) section.style.display = type === t ? 'block' : 'none';
    });
    document.getElementById('make-guess-toggle').style.display = (type === 'text') ? 'none' : 'block';
  }

  function setUploadType(type) {
    uploadType = type;
    document.getElementById('u-type-youtube').classList.toggle('active', type === 'youtube');
    document.getElementById('u-type-file').classList.toggle('active', type === 'file');
    document.getElementById('u-youtube-section').style.display = type === 'youtube' ? 'block' : 'none';
    document.getElementById('u-file-section').style.display = type === 'file' ? 'block' : 'none';
  }

  let imageUploadType = 'url';
  function setImageUploadType(type) {
    imageUploadType = type;
    document.getElementById('i-type-url').classList.toggle('active', type === 'url');
    document.getElementById('i-type-file').classList.toggle('active', type === 'file');
    document.getElementById('i-url-section').style.display = type === 'url' ? 'block' : 'none';
    document.getElementById('i-file-section').style.display = type === 'file' ? 'block' : 'none';
  }
  function previewImageUrl(url) {
    const preview = document.getElementById('u-image-url-preview');
    const thumb = document.getElementById('u-image-url-thumb');
    if (url && /^https?:\/\//.test(url)) { thumb.src = url; preview.style.display = 'block'; }
    else { preview.style.display = 'none'; }
  }
  function previewImageFile(input) {
    const file = input.files[0];
    const preview = document.getElementById('u-image-file-preview');
    if (!file) { preview.textContent = ''; return; }
    const sizeMB = (file.size / 1024 / 1024).toFixed(1);
    if (file.size > 10 * 1024 * 1024) {
      preview.innerHTML = '<span style="color:var(--danger)">⚠️ 10MB 초과</span>';
      input.value = ''; return;
    }
    preview.textContent = `✅ ${file.name} (${sizeMB}MB)`;
  }

  function toggleGuessAnswer() {
    const isG = document.getElementById('u-is-guess').checked;
    document.getElementById('u-guess-answer-row').classList.toggle('show', isG);
  }

  function previewYoutube(url) {
    const id = getYouTubeId(url);
    const preview = document.getElementById('u-yt-preview');
    const thumb = document.getElementById('u-yt-thumb');
    if (id) { thumb.src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`; preview.style.display = 'block'; }
    else { preview.style.display = 'none'; }
  }

  function previewFile(input) {
    const file = input.files[0];
    const preview = document.getElementById('u-file-preview');
    if (!file) { preview.textContent = ''; return; }
    const sizeMB = (file.size / 1024 / 1024).toFixed(1);
    if (file.size > 50 * 1024 * 1024) {
      preview.innerHTML = '<span style="color:var(--danger)">⚠️ 50MB 초과</span>';
      input.value = ''; return;
    }
    preview.textContent = `✅ ${file.name} (${sizeMB}MB)`;
  }

  async function safePostInsert(payload) {
    const tryInsert = async (p) => sb.from('posts').insert(p);
    let { error } = await tryInsert(payload);
    if (!error) return { error: null };
    const msg = (error.message || '').toLowerCase();
    if (msg.includes("'user_id'") || msg.includes('user_id column')) {
      const { user_id, ...rest } = payload;
      ({ error } = await tryInsert(rest));
      if (!error) return { error: null };
    }
    if (error && (msg.includes("'media_type'") || msg.includes('media_type column'))) {
      const { media_type, ...rest } = payload;
      ({ error } = await tryInsert(rest));
      if (!error) return { error: null };
    }
    if (error && (msg.includes("'post_type'") || msg.includes("'correct_answer'") || msg.includes("'body'"))) {
      const { user_id, post_type, correct_answer, body, media_type, ...legacy } = payload;
      if (!legacy.video_url && payload.body) {
        return { error: { message: 'post_type/body 칼럼이 없음. SQL 마이그레이션 필요.' } };
      }
      ({ error } = await tryInsert(legacy));
    }
    return { error };
  }

  async function submitUpload() {
    const btn = document.getElementById('upload-btn');
    const errorEl = document.getElementById('upload-error');
    const successEl = document.getElementById('upload-success');
    errorEl.classList.remove('show');
    successEl.classList.remove('show');

    btn.disabled = true; btn.textContent = '업로드 중...';
    try {
      if (makeType === 'text') {
        const title = document.getElementById('u-talk-title').value.trim();
        const body = document.getElementById('u-talk-body').value.trim();
        if (!title) throw new Error('제목을 입력해주세요.');
        if (!body) throw new Error('본문을 입력해주세요.');
        const res = await safePostInsert({
          title, body, post_type: 'talk', category: 'funny',
          video_url: '', video_type: 'youtube', thumbnail_url: '',
          media_type: 'text',
          user_id: currentUser.id,
        });
        if (res.error) throw res.error;
        document.getElementById('u-talk-title').value = '';
        document.getElementById('u-talk-body').value = '';
      } else if (makeType === 'image') {
        const title = document.getElementById('u-image-title').value.trim();
        if (!title) throw new Error('제목을 입력해주세요.');
        const body = document.getElementById('u-image-body').value.trim() || null;
        const isG = document.getElementById('u-is-guess').checked;
        const correctAnswer = isG ? document.getElementById('u-guess-answer').value : null;
        const post_type = isG ? 'guess' : 'flick';
        const category = isG ? 'guess' : 'funny';

        let imageUrl = '';
        if (imageUploadType === 'url') {
          imageUrl = document.getElementById('u-image-url').value.trim();
          if (!imageUrl || !/^https?:\/\//.test(imageUrl)) throw new Error('올바른 이미지 URL을 입력해주세요.');
        } else {
          const fileInput = document.getElementById('u-image-file');
          const file = fileInput.files[0];
          if (!file) throw new Error('파일을 선택해주세요.');
          document.getElementById('u-image-progress-wrap').style.display = 'block';
          const ext = file.name.split('.').pop();
          const filePath = `public/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
          let bucket = 'images';
          let upErr;
          ({ error: upErr } = await sb.storage.from(bucket).upload(filePath, file, { cacheControl: '3600', upsert: false }));
          if (upErr) {
            bucket = 'videos';
            ({ error: upErr } = await sb.storage.from(bucket).upload(filePath, file, { cacheControl: '3600', upsert: false }));
          }
          if (upErr) throw upErr;
          const { data: { publicUrl } } = sb.storage.from(bucket).getPublicUrl(filePath);
          imageUrl = publicUrl;
          document.getElementById('u-image-progress-wrap').style.display = 'none';
          fileInput.value = '';
          document.getElementById('u-image-file-preview').textContent = '';
        }
        const res = await safePostInsert({
          title, video_url: imageUrl, video_type: 'image',
          thumbnail_url: imageUrl,
          media_type: 'image', body,
          category, post_type, correct_answer: correctAnswer,
          user_id: currentUser.id,
        });
        if (res.error) throw res.error;
        document.getElementById('u-image-url').value = '';
        document.getElementById('u-image-url-preview').style.display = 'none';
        document.getElementById('u-image-title').value = '';
        document.getElementById('u-image-body').value = '';
      } else {
        const title = document.getElementById('u-video-title').value.trim();
        if (!title) throw new Error('제목을 입력해주세요.');
        const body = document.getElementById('u-video-body').value.trim() || null;
        const isG = document.getElementById('u-is-guess').checked;
        const correctAnswer = isG ? document.getElementById('u-guess-answer').value : null;
        const post_type = isG ? 'guess' : 'flick';
        const category = isG ? 'guess' : 'funny';
        const customThumb = document.getElementById('u-thumb').value.trim();

        if (uploadType === 'youtube') {
          const url = document.getElementById('u-video-url').value.trim();
          if (!url || !getYouTubeId(url)) throw new Error('올바른 YouTube URL을 입력해주세요.');
          const ytId = getYouTubeId(url);
          const thumbnail = customThumb || `https://img.youtube.com/vi/${ytId}/hqdefault.jpg`;
          const res = await safePostInsert({
            title, video_url: url, video_type: 'youtube',
            thumbnail_url: thumbnail, category, post_type, correct_answer: correctAnswer,
            media_type: 'video', body,
            user_id: currentUser.id,
          });
          if (res.error) throw res.error;
          document.getElementById('u-video-url').value = '';
          document.getElementById('u-yt-preview').style.display = 'none';
          document.getElementById('u-thumb').value = '';
        } else {
          const fileInput = document.getElementById('u-video-file');
          const file = fileInput.files[0];
          if (!file) throw new Error('파일을 선택해주세요.');
          document.getElementById('u-progress-wrap').style.display = 'block';
          const ext = file.name.split('.').pop();
          const filePath = `public/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
          const { error: upErr } = await sb.storage.from('videos').upload(filePath, file, { cacheControl: '3600', upsert: false });
          if (upErr) throw upErr;
          const { data: { publicUrl } } = sb.storage.from('videos').getPublicUrl(filePath);
          const res = await safePostInsert({
            title, video_url: publicUrl, video_type: 'upload',
            thumbnail_url: customThumb || '', storage_path: filePath,
            media_type: 'video', body,
            category, post_type, correct_answer: correctAnswer,
            user_id: currentUser.id,
          });
          if (res.error) throw res.error;
          document.getElementById('u-progress-wrap').style.display = 'none';
          document.getElementById('u-progress-bar').style.width = '0%';
          fileInput.value = '';
          document.getElementById('u-file-preview').textContent = '';
        }
        document.getElementById('u-video-title').value = '';
        document.getElementById('u-video-body').value = '';
        document.getElementById('u-is-guess').checked = false;
        toggleGuessAnswer();
      }
      successEl.classList.add('show');
      await loadAll();
      setTimeout(() => successEl.classList.remove('show'), 3000);
    } catch (err) {
      errorEl.textContent = '실패: ' + (err.message || err);
      errorEl.classList.add('show');
      document.getElementById('u-progress-wrap').style.display = 'none';
    }
    btn.disabled = false; btn.textContent = '올리기';
  }

  init();
</script>
</body>
</html>
