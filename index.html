</div>

<script>
  const SUPABASE_URL = 'https://nhjnotsgolywogbvzisz.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oam5vdHNnb2x5d29nYnZ6aXN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTk1ODUsImV4cCI6MjA5MDQzNTU4NX0.xaoVp6C0POxLCIk3bnjYYHxuSzRBdh__gc_RkfoFjN8';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentMode = null;       // 'flick' | 'msg' | null
  let currentMsgTab = 'share';  // 'share' | 'guess'
  let allPosts = [];
  let currentUser = null;
  let isAdmin = false;

  // ── 유틸 ──
  function getYouTubeId(url) {
    if (!url) return null;
    const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([^&\n?#]+)/);
    return m ? m[1] : null;
  }
  function getThumb(url) { const id = getYouTubeId(url); return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : ''; }
  function getEmbed(url) { const id = getYouTubeId(url); return id ? `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&modestbranding=1` : ''; }
  function getYouTubeWatch(url) { const id = getYouTubeId(url); return id ? `https://www.youtube.com/watch?v=${id}` : (url || ''); }
  function isYouTube(url) { return !!getYouTubeId(url); }
  function isDirectVideo(url) { return url && (url.includes('supabase.co/storage') || url.endsWith('.mp4') || url.endsWith('.webm')); }
  function getVoterId() {
    let id = localStorage.getItem('aiflick_vid');
    if (!id) { id = 'v_' + Date.now() + '_' + Math.random().toString(36).slice(2); localStorage.setItem('aiflick_vid', id); }
    return id;
  }

  // post_type 도출 (구 카테고리 → 새 타입 폴백)
  function getPostType(post) {
    if (post.post_type) return post.post_type;
    if (!post.video_url && post.body) return 'talk';
    if (post.category === 'guess' || post.category === 'lab') return 'guess';
    return 'flick';
  }
  function isGuess(post) { return getPostType(post) === 'guess'; }
  function isTalk(post) { return getPostType(post) === 'talk'; }

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  // ── 인증 ──
  async function initAuth() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) { currentUser = session.user; await loadAdminFlag(); }
    sb.auth.onAuthStateChange(async (e, session) => {
      currentUser = session?.user || null;
      await loadAdminFlag();
      updateHeaderRight();
      if (e === 'SIGNED_IN') { closeLoginModal(); await loadAll(); rerenderCurrent(); }
    });
  }

  async function loadAdminFlag() {
    if (!currentUser) { isAdmin = false; return; }
    const { data: profile } = await sb.from('profiles').select('is_admin').eq('id', currentUser.id).single();
    isAdmin = !!profile?.is_admin;
  }

  function updateHeaderRight() {
    const right = document.getElementById('header-right');
    let modeLink = '';
    if (currentMode === 'flick') {
      modeLink = `<button class="login-btn mode-link" onclick="enterMode('msg')">MSG →</button>`;
    } else if (currentMode === 'msg') {
      // MSG에선 Make는 서브헤더로 옮김 → 우측 상단엔 FLICK 돌아가기 링크
      modeLink = `<button class="login-btn mode-link" onclick="enterMode('flick')">← FLICK</button>`;
    } else if (currentMode === 'me') {
      modeLink = `<button class="login-btn mode-link" onclick="enterMode('msg')">MSG →</button>`;
    }
    let auth;
    if (currentUser) {
      const avatar = currentUser.user_metadata?.avatar_url;
      const name = currentUser.user_metadata?.full_name || currentUser.email;
      document.getElementById('user-name-display').textContent = name;
      auth = `<div style="display:flex;align-items:center;gap:8px;">
        ${isAdmin ? `<a href="admin.html" class="admin-link">관리자</a>` : ''}
        ${avatar ? `<img class="user-avatar" src="${avatar}" onclick="toggleUserMenu()">` : `<button class="login-btn" onclick="toggleUserMenu()">${escapeHtml(String(name).slice(0,4))}</button>`}
      </div>`;
    } else {
      auth = `<button class="login-btn" onclick="showLoginModal()">로그인</button>`;
    }
    right.innerHTML = modeLink + auth;
  }

  function toggleUserMenu() { document.getElementById('user-menu').classList.toggle('show'); }
  document.addEventListener('click', e => {
    if (!e.target.closest('#user-menu') && !e.target.closest('.user-avatar') && !e.target.closest('[onclick="toggleUserMenu()"]'))
      document.getElementById('user-menu').classList.remove('show');
  });

  async function loginWithGoogle() {
    await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
  }
  async function doLogout() { await sb.auth.signOut(); document.getElementById('user-menu').classList.remove('show'); }
  function showLoginModal() { document.getElementById('login-modal').classList.add('show'); }
  function closeLoginModal() { document.getElementById('login-modal').classList.remove('show'); }
  function showUploadModal(preselectType) {
    if (!currentUser) { showLoginModal(); return; }
    document.getElementById('upload-modal').classList.add('show');
    if (preselectType === 'video' || preselectType === 'text') setMakeType(preselectType);
  }
  function closeUploadModal() {
    document.getElementById('upload-modal').classList.remove('show');
    document.getElementById('u-upload-success').style.display = 'none';
    document.getElementById('u-upload-error').style.display = 'none';
  }

  // ── MAKE 모달 — 영상/글 토글 ──
  let makeType = 'video';
  function setMakeType(type) {
    makeType = type;
    document.getElementById('m-tab-video').classList.toggle('active', type === 'video');
    document.getElementById('m-tab-text').classList.toggle('active', type === 'text');
    document.getElementById('make-video-section').style.display = type === 'video' ? 'block' : 'none';
    document.getElementById('make-text-section').style.display = type === 'text' ? 'block' : 'none';
  }

  function toggleGuessAnswer() {
    const isQ = document.getElementById('u-is-guess').checked;
    document.getElementById('u-guess-answer-row').classList.toggle('show', isQ);
  }

  let userUploadType = 'youtube';
  function setUserUploadType(type) {
    userUploadType = type;
    document.getElementById('u-type-youtube').classList.toggle('active', type === 'youtube');
    document.getElementById('u-type-file').classList.toggle('active', type === 'file');
    document.getElementById('u-youtube-section').style.display = type === 'youtube' ? 'block' : 'none';
    document.getElementById('u-file-section').style.display = type === 'file' ? 'block' : 'none';
  }

  function previewUserYoutube(url) {
    const id = getYouTubeId(url);
    const preview = document.getElementById('u-yt-preview');
    if (id) { document.getElementById('u-yt-thumb').src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`; preview.style.display = 'block'; }
    else { preview.style.display = 'none'; }
  }

  function previewUserFile(input) {
    const file = input.files[0];
    const preview = document.getElementById('u-file-preview');
    if (!file) { preview.textContent = ''; return; }
    const sizeMB = (file.size / 1024 / 1024).toFixed(1);
    if (file.size > 50 * 1024 * 1024) { preview.innerHTML = '<span style="color:#f87171">⚠️ 50MB 초과예요.</span>'; input.value = ''; return; }
    preview.textContent = `✅ ${file.name} (${sizeMB}MB)`;
  }

  // 스키마에 칼럼 없으면 자동으로 빼고 재시도
  async function safePostInsert(payload) {
    const tryInsert = async (p) => sb.from('posts').insert(p);
    let { error } = await tryInsert(payload);
    if (!error) return { error: null };
    const msg = (error.message || '').toLowerCase();
    // user_id 칼럼 없음
    if (msg.includes("'user_id'") || msg.includes('user_id column')) {
      const { user_id, ...rest } = payload;
      ({ error } = await tryInsert(rest));
      if (!error) return { error: null, warning: 'user_id 칼럼 없음 — 마이페이지 추적 안 됨. SQL 마이그레이션 필요.' };
    }
    // post_type / body / correct_answer 도 같이 폴백
    if (error && (msg.includes("'post_type'") || msg.includes("'correct_answer'") || msg.includes("'body'"))) {
      const { user_id, post_type, correct_answer, body, ...legacy } = payload;
      // body가 있고 video_url이 없으면 talk 글이라 → legacy 스키마에선 영상 없는 글 저장 불가
      if (!legacy.video_url && payload.body) {
        return { error: { message: 'post_type/body 칼럼이 없어 글 저장 불가. SQL 마이그레이션 필요.' } };
      }
      ({ error } = await tryInsert(legacy));
      if (!error) return { error: null, warning: 'Phase 1/2 칼럼이 없어 일부 정보 누락. SQL 마이그레이션 필요.' };
    }
    return { error };
  }

  async function submitUserUpload() {
    if (!currentUser) { showLoginModal(); return; }
    const btn = document.getElementById('u-upload-btn');
    const errorEl = document.getElementById('u-upload-error');
    const successEl = document.getElementById('u-upload-success');
    errorEl.style.display = 'none'; successEl.style.display = 'none';

    btn.disabled = true; btn.textContent = '업로드 중...';
    try {
      if (makeType === 'text') {
        const title = document.getElementById('u-talk-title').value.trim();
        const body = document.getElementById('u-talk-body').value.trim();
        if (!title) throw new Error('제목을 입력해주세요.');
        if (!body) throw new Error('본문을 입력해주세요.');
        const res = await safePostInsert({
          title, body,
          post_type: 'talk',
          category: 'funny',
          video_url: '',
          video_type: 'youtube',
          thumbnail_url: '',
          user_id: currentUser.id,
        });
        if (res.error) throw res.error;
        if (res.warning) console.warn(res.warning);
        document.getElementById('u-talk-title').value = '';
        document.getElementById('u-talk-body').value = '';
      } else {
        const title = document.getElementById('u-video-title').value.trim();
        if (!title) throw new Error('제목을 입력해주세요.');
        const isQ = document.getElementById('u-is-guess').checked;
        const correctAnswer = isQ ? document.getElementById('u-guess-answer').value : null;
        const post_type = isQ ? 'guess' : 'flick';
        const category = isQ ? 'guess' : 'funny';

        if (userUploadType === 'youtube') {
          const url = document.getElementById('u-video-url').value.trim();
          if (!url || !getYouTubeId(url)) throw new Error('올바른 YouTube URL을 입력해주세요.');
          const ytId = getYouTubeId(url);
          const res = await safePostInsert({
            title, video_url: url, video_type: 'youtube',
            thumbnail_url: `https://img.youtube.com/vi/${ytId}/hqdefault.jpg`,
            category, post_type, correct_answer: correctAnswer,
            user_id: currentUser.id,
          });
          if (res.error) throw res.error;
          if (res.warning) console.warn(res.warning);
          document.getElementById('u-video-url').value = '';
          document.getElementById('u-yt-preview').style.display = 'none';
        } else {
          const fileInput = document.getElementById('u-video-file');
          const file = fileInput.files[0];
          if (!file) throw new Error('파일을 선택해주세요.');
          document.getElementById('u-progress-wrap').style.display = 'block';
          const ext = file.name.split('.').pop();
          const filePath = `public/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
          const { error: upErr } = await sb.storage.from('videos').upload(filePath, file, { cacheControl: '3600', upsert: false });
          if (upErr) throw upErr;
          const { data: { publicUrl } } = sb.storage.from('videos').getPublicUrl(filePath);
          const res = await safePostInsert({
            title, video_url: publicUrl, video_type: 'upload',
            thumbnail_url: '', storage_path: filePath,
            category, post_type, correct_answer: correctAnswer,
            user_id: currentUser.id,
          });
          if (res.error) throw res.error;
          if (res.warning) console.warn(res.warning);
          document.getElementById('u-progress-wrap').style.display = 'none';
          fileInput.value = '';
          document.getElementById('u-file-preview').textContent = '';
        }
        document.getElementById('u-video-title').value = '';
        document.getElementById('u-is-guess').checked = false;
        toggleGuessAnswer();
      }

      successEl.style.display = 'block';
      await loadAll();
      rerenderCurrent();
      setTimeout(() => closeUploadModal(), 1800);
    } catch (err) {
      // post_type 칼럼이 아직 없으면 폴백 (스키마 마이그레이션 전에도 동작하도록)
      if (err.message && err.message.includes("'post_type'")) {
        try {
          // 재시도 — post_type 빼고
          const isQ2 = document.getElementById('u-is-guess')?.checked;
          const cat2 = (makeType === 'text') ? 'funny' : (isQ2 ? 'guess' : 'funny');
          if (makeType === 'text') {
            const title = document.getElementById('u-talk-title').value.trim();
            const body = document.getElementById('u-talk-body').value.trim();
            const { error } = await sb.from('posts').insert({ title, category: cat2, video_url: '', video_type: 'youtube' });
            if (error) throw error;
            errorEl.textContent = '⚠️ post_type 칼럼이 없어 일반 영상으로 저장됨 (글 본문 미저장). 스키마 마이그레이션 필요.';
          }
        } catch (e2) {
          errorEl.textContent = '업로드 실패: ' + (err.message || err);
        }
        errorEl.style.display = 'block';
      } else {
        errorEl.textContent = '업로드 실패: ' + (err.message || err);
        errorEl.style.display = 'block';
      }
      document.getElementById('u-progress-wrap').style.display = 'none';
    }
    btn.disabled = false; btn.textContent = '올리기';
  }

  // ── 모드 전환 ──
  function showLanding() {
    document.getElementById('landing-screen').classList.add('show');
    document.getElementById('main-header').classList.remove('show');
    document.getElementById('flick-wrap').classList.remove('active');
    document.getElementById('msg-wrap').classList.remove('active');
    document.getElementById('header-sub').classList.remove('show');
  }

  function enterMode(mode) {
    currentMode = mode;
    const remember = document.getElementById('remember-mode')?.checked;
    if (remember) localStorage.setItem('aiflick_mode', mode);

    document.getElementById('landing-screen').classList.remove('show');
    document.getElementById('main-header').classList.add('show');
    document.getElementById('bc-mode').textContent = mode;

    // ME 모드는 로그인 필수
    if (mode === 'me' && !currentUser) {
      showLoginModal();
      currentMode = null;
      return;
    }

    document.getElementById('flick-wrap').classList.toggle('active', mode === 'flick');
    document.getElementById('msg-wrap').classList.toggle('active', mode === 'msg');
    document.getElementById('me-wrap').classList.toggle('active', mode === 'me');
    document.getElementById('header-sub').classList.toggle('show', mode === 'msg');

    if (mode === 'flick') renderFlick();
    else if (mode === 'msg') setMsgTab(currentMsgTab);
    else if (mode === 'me') renderMe();

    updateHeaderRight();
    document.getElementById('user-menu').classList.remove('show');
  }

  function goLanding(e) {
    if (e) e.preventDefault();
    localStorage.removeItem('aiflick_mode');
    currentMode = null;
    showLanding();
  }

  function setMsgTab(tab) {
    if (tab !== 'share' && tab !== 'guess') tab = 'share';
    currentMsgTab = tab;
    document.querySelectorAll('.msg-tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === tab);
    });
    if (tab === 'share') renderShare();
    else renderGuess();
  }

  function rerenderCurrent() {
    if (currentMode === 'flick') renderFlick();
    else if (currentMode === 'msg') {
      if (currentMsgTab === 'guess') renderGuess();
      else renderShare();
    } else if (currentMode === 'me') renderMe();
  }

  async function loadAll() {
    const { data } = await sb.from('posts').select('*').order('created_at', { ascending: false });
    allPosts = data || [];
  }

  // ── FLICK MODE 렌더 ──
  async function renderFlick() {
    const wrap = document.getElementById('flick-wrap');
    const posts = allPosts.filter(p => !isTalk(p)); // 글은 FLICK에서 제외
    if (!posts.length) {
      wrap.innerHTML = `<div style="height:100dvh;display:flex;align-items:center;justify-content:center;"><div style="text-align:center;color:rgba(255,255,255,0.6)"><div style="font-size:48px;margin-bottom:16px">🎬</div><p>아직 영상이 없어요</p><button class="login-btn" style="margin-top:16px;color:white;border-color:rgba(255,255,255,0.3);" onclick="enterMode('msg')">MSG에서 올려보기 →</button></div></div>`;
      return;
    }
    wrap.innerHTML = `<div style="height:100dvh;display:flex;align-items:center;justify-content:center;"><div class="loading"><div class="spinner"></div></div></div>`;

    const items = [];
    for (const post of posts) {
      const [{ data: votes }, { data: reactions }, { data: comments }] = await Promise.all([
        sb.from('votes').select('*').eq('post_id', post.id),
        sb.from('reactions').select('*').eq('post_id', post.id),
        sb.from('comments').select('id').eq('post_id', post.id),
      ]);
      const aiV = (votes||[]).filter(v => v.vote_type==='ai').length;
      const realV = (votes||[]).filter(v => v.vote_type==='real').length;
      const total = aiV + realV;
      const myVote = (votes||[]).find(v => v.voter_id===getVoterId());
      const likeCount = (reactions||[]).filter(r => r.type==='like').length;
      const cmtCount = (comments||[]).length;

      items.push({ post, likeCount, cmtCount, aiV, realV, total, myVote });
    }

    wrap.innerHTML = '';
    items.forEach(({ post, likeCount, cmtCount, aiV, realV, total, myVote }) => {
      const div = document.createElement('div');
      div.className = 'short-item';
      div.dataset.videoUrl = post.video_url;
      div.dataset.postId = post.id;
      div.dataset.isGuess = isGuess(post) ? '1' : '0';
      div.dataset.correctAnswer = post.correct_answer || '';

      const aiPct = total ? Math.round(aiV/total*100) : 50;
      const realPct = total ? 100 - aiPct : 50;

      const guessSlideup = isGuess(post) ? `
        <div class="guess-slideup" id="gs-${post.id}">
          <div class="guess-slideup-q"><span class="accent">REAL</span> or <span class="accent">AI</span>?</div>
          <div class="guess-slideup-btns">
            <button class="guess-slideup-btn real ${myVote?.vote_type==='real'?'voted':''}" onclick="guessSlideupVote('${post.id}','real',this)">진짜</button>
            <button class="guess-slideup-btn ai ${myVote?.vote_type==='ai'?'voted':''}" onclick="guessSlideupVote('${post.id}','ai',this)">AI</button>
          </div>
          <div class="guess-slideup-stats ${myVote?'show':''}" id="gstats-${post.id}">
            <div class="guess-stats-bar">
              <div class="b-real" style="width:${realPct}%"></div>
              <div class="b-ai" style="width:${aiPct}%"></div>
            </div>
            <div class="guess-stats-row">
              <span class="real">진짜 ${realPct}% (${realV})</span>
              <span class="ai">AI ${aiPct}% (${aiV})</span>
            </div>
            ${post.correct_answer && myVote ? `<div class="guess-answer-tag">정답: <span class="a">${post.correct_answer === 'ai' ? 'AI' : 'REAL'}</span></div>` : ''}
          </div>
        </div>` : '';

      const ytWatch = isYouTube(post.video_url) ? `<a class="short-yt-fallback" href="${escapeHtml(getYouTubeWatch(post.video_url))}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ YouTube</a>` : '';
      div.innerHTML = `
        <div class="short-mode-tag" onclick="goLanding(event)"><span class="lg">AIFLICK</span> / FLICK</div>
        ${ytWatch}
        <div class="short-video-placeholder" style="position:absolute;top:0;left:0;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;z-index:1;">
          <div class="spinner"></div>
        </div>
        <div class="short-right">
          <div class="short-action">
            <button class="short-action-btn" id="like-btn-${post.id}" onclick="shortReact('${post.id}','like',this)">
              <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </button>
            <span class="short-action-count" id="slike-${post.id}">${likeCount}</span>
          </div>
          <div class="short-action">
            <button class="short-action-btn" onclick="openModal('${post.id}')">
              <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            </button>
            <span class="short-action-count">${cmtCount}</span>
          </div>
        </div>
        <div class="short-overlay">
          <div class="short-title">${escapeHtml(post.title || '')}</div>
          <div class="short-byline">${isGuess(post) ? '— Guess · 진짜인지 AI인지 맞혀봐' : '— flick'}</div>
        </div>
        ${guessSlideup}`;
      wrap.appendChild(div);
    });

    // IntersectionObserver로 자동 재생 + Guess 슬라이드업 타이밍
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const item = entry.target;
        const url = item.dataset.videoUrl;
        const postId = item.dataset.postId;
        const isGuessItem = item.dataset.isGuess === '1';

        if (entry.isIntersecting) {
          if (!item.querySelector('iframe, video')) {
            const placeholder = item.querySelector('.short-video-placeholder');
            if (isDirectVideo(url)) {
              const v = document.createElement('video');
              v.src = url; v.autoplay = true; v.playsInline = true;
              v.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;background:#000;z-index:1;';
              if (placeholder) placeholder.replaceWith(v); else item.prepend(v);
              const ctrl = document.createElement('div');
              ctrl.className = 'video-controls show';
              ctrl.innerHTML = `
                <div class="video-progress-wrap" id="prog-wrap-${postId}">
                  <div class="video-progress-bar" id="prog-bar-${postId}"></div>
                </div>
                <div class="video-ctrl-row">
                  <button class="video-ctrl-btn" onclick="togglePlay('${postId}')">
                    <svg id="play-icon-${postId}" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                  </button>
                  <button class="video-ctrl-btn" onclick="toggleMute('${postId}')">
                    <svg id="mute-icon-${postId}" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                  </button>
                  <span class="video-time" id="time-${postId}">0:00 / 0:00</span>
                </div>`;
              item.appendChild(ctrl);
              const tapArea = document.createElement('div');
              tapArea.className = 'video-tap-area';
              tapArea.onclick = () => togglePlay(postId);
              item.appendChild(tapArea);
              v.addEventListener('timeupdate', () => updateProgress(postId, v));
              v.addEventListener('loadedmetadata', () => updateProgress(postId, v));
              ctrl.querySelector('.video-progress-wrap').addEventListener('click', (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                v.currentTime = ((e.clientX - rect.left) / rect.width) * v.duration;
              });
            } else {
              const f = document.createElement('iframe');
              f.src = getEmbed(url);
              f.allowFullscreen = true; f.allow = 'autoplay; fullscreen';
              f.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:none;z-index:1;';
              if (placeholder) placeholder.replaceWith(f); else item.prepend(f);
            }
          } else {
            const v = item.querySelector('video');
            if (v) v.play();
          }

          // Guess 슬라이드업 — 3초 후 노출
          if (isGuessItem) {
            const slideup = document.getElementById(`gs-${postId}`);
            if (slideup) {
              setTimeout(() => {
                if (item.classList.contains('intersecting-active')) slideup.classList.add('show');
              }, 3000);
            }
            item.classList.add('intersecting-active');
          }
        } else {
          item.classList.remove('intersecting-active');
          const slideup = document.getElementById(`gs-${postId}`);
          if (slideup) slideup.classList.remove('show');

          const iframe = item.querySelector('iframe');
          const video = item.querySelector('video');
          if (iframe) {
            iframe.remove();
            const ph = document.createElement('div');
            ph.className = 'short-video-placeholder';
            ph.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;z-index:1;';
            ph.innerHTML = '<div class="spinner"></div>';
            item.prepend(ph);
          }
          if (video) { video.pause(); video.src = ''; video.remove(); }
        }
      });
    }, { threshold: 0.7 });

    wrap.querySelectorAll('.short-item').forEach(item => observer.observe(item));
  }

  // 비디오 컨트롤
  function getVideoEl(postId) {
    const item = document.querySelector(`.short-item[data-post-id="${postId}"]`);
    return item ? item.querySelector('video') : null;
  }
  function togglePlay(postId) {
    const v = getVideoEl(postId); if (!v) return;
    const icon = document.getElementById(`play-icon-${postId}`);
    if (v.paused) { v.play(); if (icon) icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; }
    else { v.pause(); if (icon) icon.innerHTML = '<path d="M8 5v14l11-7z"/>'; }
  }
  function toggleMute(postId) {
    const v = getVideoEl(postId); if (!v) return;
    v.muted = !v.muted;
    const icon = document.getElementById(`mute-icon-${postId}`);
    if (icon) icon.innerHTML = v.muted
      ? '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>'
      : '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
  }
  function formatTime(s) { if(isNaN(s)) return '0:00'; return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }
  function updateProgress(postId, v) {
    const bar = document.getElementById(`prog-bar-${postId}`);
    const time = document.getElementById(`time-${postId}`);
    if (bar && v.duration) bar.style.width = (v.currentTime/v.duration*100)+'%';
    if (time) time.textContent = `${formatTime(v.currentTime)} / ${formatTime(v.duration)}`;
  }

  // Guess 슬라이드업 투표
  async function guessSlideupVote(postId, type, btn) {
    if (!currentUser) { showLoginModal(); return; }
    const voterId = getVoterId();
    const { data: ex } = await sb.from('votes').select('id').eq('post_id', postId).eq('voter_id', voterId);
    if (!ex || !ex.length) {
      await sb.from('votes').insert({ post_id: postId, vote_type: type, voter_id: voterId, user_id: currentUser?.id || null });
    }
    btn.parentElement.querySelectorAll('.guess-slideup-btn').forEach(b => b.classList.remove('voted'));
    btn.classList.add('voted');
    // 통계 갱신
    const { data: votes } = await sb.from('votes').select('*').eq('post_id', postId);
    const ai = votes.filter(v => v.vote_type==='ai').length;
    const real = votes.filter(v => v.vote_type==='real').length;
    const total = ai + real;
    const aiPct = total ? Math.round(ai/total*100) : 50;
    const realPct = total ? 100 - aiPct : 50;
    const stats = document.getElementById(`gstats-${postId}`);
    if (stats) {
      stats.classList.add('show');
      stats.querySelector('.b-real').style.width = realPct + '%';
      stats.querySelector('.b-ai').style.width = aiPct + '%';
      stats.querySelector('.real').textContent = `진짜 ${realPct}% (${real})`;
      stats.querySelector('.ai').textContent = `AI ${aiPct}% (${ai})`;
      const post = allPosts.find(p => p.id === postId);
      if (post && post.correct_answer && !stats.querySelector('.guess-answer-tag')) {
        const tag = document.createElement('div');
        tag.className = 'guess-answer-tag';
        tag.innerHTML = `정답: <span class="a">${post.correct_answer === 'ai' ? 'AI' : 'REAL'}</span>`;
        stats.appendChild(tag);
      }
    }
  }

  async function shortReact(postId, type, btn) {
    if (!currentUser) { showLoginModal(); return; }
    await sb.from('reactions').insert({ post_id: postId, type, user_id: currentUser?.id || null });
    const el = document.getElementById(`slike-${postId}`);
    if (el) el.textContent = parseInt(el.textContent) + 1;
    btn.classList.add('liked', 'heart-pop');
    setTimeout(() => btn.classList.remove('heart-pop'), 300);
  }

  // ── MSG / SHARE 렌더 ──
  function renderShare() {
    const container = document.getElementById('msg-container');
    const posts = allPosts;
    if (!posts.length) {
      container.innerHTML = `<div class="empty-state"><div class="emoji">🎬</div><h3>아직 아무도 없어요</h3><p>첫 번째로 영상이나 글을 올려보세요.<br><button class="login-btn make-btn" style="margin-top:16px" onclick="showUploadModal()">+ Make</button></p></div>`;
      return;
    }
    container.innerHTML = `<div class="grid">${posts.map(renderPostCard).join('')}</div>`;
  }

  // ── MSG / GUESS 렌더 (Guess만) ──
  function renderGuess() {
    const container = document.getElementById('msg-container');
    const posts = allPosts.filter(isGuess);
    if (!posts.length) {
      container.innerHTML = `<div class="empty-state"><div class="emoji">❓</div><h3>Guess 모드 영상이 없어요</h3><p>업로드 시 <strong>Guess 모드</strong> 토글을 켜면 여기 표시됩니다.<br><button class="login-btn make-btn" style="margin-top:16px" onclick="showUploadModal()">+ Make Guess</button></p></div>`;
      return;
    }
    container.innerHTML = `<div class="grid">${posts.map(renderPostCard).join('')}</div>`;
  }

  // ── ME / My Page 렌더 ──
  async function renderMe() {
    const container = document.getElementById('me-container');
    if (!currentUser) {
      container.innerHTML = `<div class="me-empty"><div class="emoji">🔒</div>로그인하면 내 페이지가 보여요.<br><button class="login-btn" style="margin-top:14px" onclick="showLoginModal()">로그인</button></div>`;
      return;
    }

    container.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;

    const uid = currentUser.id;
    const avatar = currentUser.user_metadata?.avatar_url;
    const name = currentUser.user_metadata?.full_name || currentUser.email || 'user';
    const email = currentUser.email || '';
    const joinedAt = currentUser.created_at ? new Date(currentUser.created_at).toLocaleDateString('ko-KR') : '—';

    // 내가 올린 포스트 + 활동 카운트 병렬 로드
    let myPosts = [], voteCount = 0, commentCount = 0, reactionCount = 0;
    try {
      const [pRes, vRes, cRes, rRes] = await Promise.all([
        sb.from('posts').select('*').eq('user_id', uid).order('created_at', { ascending: false }),
        sb.from('votes').select('id', { count: 'exact', head: true }).eq('user_id', uid),
        sb.from('comments').select('id', { count: 'exact', head: true }).eq('user_id', uid),
        sb.from('reactions').select('id', { count: 'exact', head: true }).eq('user_id', uid),
      ]);
      myPosts = pRes.data || [];
      voteCount = vRes.count || 0;
      commentCount = cRes.count || 0;
      reactionCount = rRes.count || 0;
    } catch (err) {
      // user_id 칼럼이 없을 가능성 — 마이그레이션 안 됐으면 우아하게 빈 상태
      console.warn('My Page query error:', err);
    }

    const profileHTML = `
      <div class="profile-card">
        ${avatar
          ? `<img class="profile-avatar" src="${escapeHtml(avatar)}" alt="">`
          : `<div class="profile-avatar placeholder">${escapeHtml(String(name).slice(0,2).toUpperCase())}</div>`}
        <div class="profile-info">
          <div class="profile-name">${escapeHtml(name)}</div>
          <div class="profile-email">${escapeHtml(email)}</div>
          <div class="profile-joined">JOINED <span class="num">${joinedAt}</span></div>
        </div>
      </div>`;

    const statsHTML = `
      <div class="me-stats-grid">
        <div class="me-stat-card"><div class="me-stat-num">${myPosts.length}</div><div class="me-stat-lbl">Posts</div></div>
        <div class="me-stat-card"><div class="me-stat-num">${voteCount}</div><div class="me-stat-lbl">Votes</div></div>
        <div class="me-stat-card"><div class="me-stat-num">${commentCount}</div><div class="me-stat-lbl">Comments</div></div>
        <div class="me-stat-card"><div class="me-stat-num">${reactionCount}</div><div class="me-stat-lbl">Reactions</div></div>
      </div>`;

    const postsHTML = myPosts.length
      ? `<div class="grid">${myPosts.map(renderPostCard).join('')}</div>`
      : `<div class="me-empty"><div class="emoji">🎬</div>아직 올린 게 없어요.<br><button class="login-btn make-btn" style="margin-top:14px" onclick="enterMode('msg');setTimeout(showUploadModal,100)">+ Make 첫 포스트</button></div>`;

    container.innerHTML = `
      ${profileHTML}
      ${statsHTML}
      <div class="me-section-title">내 포스트 <span class="accent">posts</span></div>
      ${postsHTML}
      <div class="me-section-title">Guess 기록 <span class="accent">stats</span></div>
      <div class="me-soon">DATA 쌓이는 중 · 곧 정확도 / 스트릭 표시 예정</div>
    `;
  }

  function renderPostCard(post) {
    const type = getPostType(post);
    if (type === 'talk') {
      const preview = (post.body || '').slice(0, 200);
      return `
        <div class="post-card talk" onclick="openModal('${post.id}')">
          <div class="post-type-tag talk">TALK</div>
          <div class="talk-headline">${escapeHtml(post.title || '')}</div>
          <div class="talk-preview">${escapeHtml(preview)}</div>
          <div class="post-body">
            <div class="post-meta">
              <span>${new Date(post.created_at).toLocaleDateString('ko-KR')}</span>
              <span class="dot">·</span>
              <span class="stat">조회 ${post.view_count || 0}</span>
            </div>
          </div>
        </div>`;
    }
    const thumb = post.thumbnail_url || getThumb(post.video_url) || '';
    const tagClass = type === 'guess' ? 'guess' : 'flick';
    const tagLabel = type === 'guess' ? 'GUESS' : 'FLICK';
    return `
      <div class="post-card" onclick="openModal('${post.id}')">
        <div class="post-thumb">
          <div class="post-type-tag ${tagClass}">${tagLabel}</div>
          ${thumb ? `<img src="${escapeHtml(thumb)}" alt="" onerror="this.style.background='#111';this.style.display='none'">` : '<div style="position:absolute;inset:0;background:#0a0a14;"></div>'}
          <div class="play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        </div>
        <div class="post-body">
          <div class="post-title">${escapeHtml(post.title || '')}</div>
          <div class="post-meta">
            <span>${new Date(post.created_at).toLocaleDateString('ko-KR')}</span>
            <span class="dot">·</span>
            <span class="stat">조회 ${post.view_count || 0}</span>
          </div>
        </div>
      </div>`;
  }

  // ── 모달 ──
  async function openModal(postId) {
    const post = allPosts.find(p => p.id===postId); if (!post) return;
    document.getElementById('modal-title').textContent = post.title;
    const [{ data: comments }, { data: votes }] = await Promise.all([
      sb.from('comments').select('*').eq('post_id', postId).order('created_at', { ascending: false }),
      sb.from('votes').select('*').eq('post_id', postId),
    ]);

    const type = getPostType(post);
    let mediaHTML = '';

    if (type === 'talk') {
      mediaHTML = `<div class="talk-body-md">${escapeHtml(post.body || '')}</div>`;
    } else {
      if (isDirectVideo(post.video_url)) {
        mediaHTML = `<div class="modal-video"><video src="${escapeHtml(post.video_url)}" controls autoplay playsinline></video></div>`;
      } else if (isYouTube(post.video_url)) {
        mediaHTML = `<div class="modal-video iframe-frame"><iframe src="${getEmbed(post.video_url)}" allowfullscreen allow="autoplay; encrypted-media; fullscreen"></iframe></div>
          <div class="yt-fallback">
            <a href="${escapeHtml(getYouTubeWatch(post.video_url))}" target="_blank" rel="noopener">
              <svg width="18" height="14" viewBox="0 0 28 20" fill="currentColor"><path d="M27.4 3.1a3.5 3.5 0 0 0-2.5-2.5C22.7 0 14 0 14 0S5.3 0 3.1.6A3.5 3.5 0 0 0 .6 3.1C0 5.3 0 10 0 10s0 4.7.6 6.9a3.5 3.5 0 0 0 2.5 2.5C5.3 20 14 20 14 20s8.7 0 10.9-.6a3.5 3.5 0 0 0 2.5-2.5c.6-2.2.6-6.9.6-6.9s0-4.7-.6-6.9zM11.2 14.3V5.7L18.5 10l-7.3 4.3z"/></svg>
              YouTube에서 보기
            </a>
            <div class="yt-fallback-note">▲ 영상이 안 보이거나 "오류 153" 뜨면 위 버튼 클릭<br>(영상 업로더가 외부 임베드를 차단한 경우)</div>
          </div>`;
      } else {
        mediaHTML = `<div class="modal-video" style="display:flex;align-items:center;justify-content:center;color:var(--muted);">영상 URL을 인식할 수 없어요</div>`;
      }
      // Guess 영상이면 투표 섹션
      if (type === 'guess') {
        const aiV = (votes||[]).filter(v=>v.vote_type==='ai').length;
        const realV = (votes||[]).filter(v=>v.vote_type==='real').length;
        const total = aiV + realV;
        const aiPct = total ? Math.round(aiV/total*100) : 50;
        const realPct = total ? 100 - aiPct : 50;
        const myVote = (votes||[]).find(v=>v.voter_id===getVoterId());
        const showStats = !!myVote || total > 0;
        mediaHTML += `
          <div class="modal-vote">
            <div class="modal-vote-label">REAL or AI?</div>
            ${currentUser ? `
              <div class="modal-vote-buttons">
                <button class="modal-vote-btn real ${myVote?.vote_type==='real'?'voted':''}" onclick="modalVote('${post.id}','real',this)">진짜</button>
                <button class="modal-vote-btn ai ${myVote?.vote_type==='ai'?'voted':''}" onclick="modalVote('${post.id}','ai',this)">AI</button>
              </div>
            ` : `<div class="login-prompt-inline" onclick="showLoginModal()" style="margin-bottom:0">🔒 로그인하면 투표 가능</div>`}
            <div class="modal-vote-stats ${showStats ? 'show' : ''}" id="mvs-${post.id}">
              <div class="modal-vote-bar">
                <div class="real" style="width:${realPct}%"></div>
                <div class="ai" style="width:${aiPct}%"></div>
              </div>
              <div class="modal-vote-counts">
                <span class="real">진짜 ${realPct}% (${realV})</span>
                <span class="ai">AI ${aiPct}% (${aiV})</span>
              </div>
              ${post.correct_answer && myVote ? `<div style="margin-top:8px;text-align:center;font-size:12px;color:var(--muted2);">정답: <strong style="color:#34d399;">${post.correct_answer === 'ai' ? 'AI' : 'REAL'}</strong></div>` : ''}
            </div>
          </div>`;
      }
    }

    const reactionTypes = [{type:'hot',emoji:'🔥'},{type:'funny',emoji:'😂'},{type:'wow',emoji:'🤯'},{type:'like',emoji:'👍'}];
    const { data: reactions } = await sb.from('reactions').select('*').eq('post_id', postId);

    document.getElementById('modal-body').innerHTML = `
      ${mediaHTML}
      <div class="reaction-bar" style="margin-top:14px">
        ${reactionTypes.map(r => { const cnt=(reactions||[]).filter(rx=>rx.type===r.type).length; return `<button class="reaction-btn" onclick="modalReact('${postId}','${r.type}',this)">${r.emoji} <span>${cnt}</span></button>`; }).join('')}
      </div>
      <div style="font-size:13px;font-weight:700;margin-bottom:10px;color:var(--muted2);margin-top:6px">💬 댓글 ${(comments||[]).length}개</div>
      <div id="modal-comments" style="margin-bottom:12px">
        ${(comments||[]).map(c=>`<div class="comment-item" style="margin-bottom:8px"><span class="nickname">${escapeHtml(c.nickname || '')}</span>${escapeHtml(c.content || '')}</div>`).join('') || '<p style="color:var(--muted);font-size:13px">첫 댓글을 남겨보세요!</p>'}
      </div>
      ${currentUser
        ? `<div class="comment-input-wrap"><input class="comment-input" type="text" placeholder="댓글 남기기..." id="mci" maxlength="200" onkeydown="if(event.key==='Enter')submitModalComment('${postId}')"><button class="comment-submit" onclick="submitModalComment('${postId}')">등록</button></div>`
        : `<div class="login-prompt-inline" onclick="showLoginModal()">댓글 작성은 로그인 후 가능해요</div>`}`;
    document.getElementById('post-modal').classList.add('show');
    sb.from('posts').update({ view_count: (post.view_count||0)+1 }).eq('id', postId).then(()=>{});
  }

  async function modalVote(postId, type, btn) {
    if (!currentUser) { showLoginModal(); return; }
    const voterId = getVoterId();
    const { data: ex } = await sb.from('votes').select('id').eq('post_id', postId).eq('voter_id', voterId);
    if (!ex || !ex.length) {
      await sb.from('votes').insert({ post_id: postId, vote_type: type, voter_id: voterId, user_id: currentUser?.id || null });
    }
    btn.parentElement.querySelectorAll('.modal-vote-btn').forEach(b => b.classList.remove('voted'));
    btn.classList.add('voted');
    const { data: votes } = await sb.from('votes').select('*').eq('post_id', postId);
    const ai = votes.filter(v=>v.vote_type==='ai').length, real = votes.filter(v=>v.vote_type==='real').length, tot = ai+real;
    const ap = tot ? Math.round(ai/tot*100) : 50, rp = tot ? 100-ap : 50;
    const stats = document.getElementById(`mvs-${postId}`);
    if (stats) {
      stats.classList.add('show');
      stats.querySelector('.modal-vote-bar .real').style.width = rp + '%';
      stats.querySelector('.modal-vote-bar .ai').style.width = ap + '%';
      stats.querySelectorAll('.modal-vote-counts .real')[0].textContent = `진짜 ${rp}% (${real})`;
      stats.querySelectorAll('.modal-vote-counts .ai')[0].textContent = `AI ${ap}% (${ai})`;
    }
  }

  async function modalReact(postId, type, btn) {
    if (!currentUser) { showLoginModal(); return; }
    await sb.from('reactions').insert({ post_id: postId, type, user_id: currentUser?.id || null });
    btn.querySelector('span').textContent = parseInt(btn.querySelector('span').textContent) + 1;
    btn.classList.add('reacted');
  }

  async function submitModalComment(postId) {
    if (!currentUser) { showLoginModal(); return; }
    const input = document.getElementById('mci');
    const content = input.value.trim(); if (!content) return;
    const nickname = currentUser.user_metadata?.full_name || 'user_' + Math.floor(Math.random()*9999);
    await sb.from('comments').insert({ post_id: postId, content, nickname, user_id: currentUser?.id || null });
    const div = document.createElement('div'); div.className = 'comment-item'; div.style.marginBottom = '8px';
    div.innerHTML = `<span class="nickname">${escapeHtml(nickname)}</span>${escapeHtml(content)}`;
    document.getElementById('modal-comments').appendChild(div);
    input.value = '';
  }

  function closeModal() {
    document.getElementById('post-modal').classList.remove('show');
    // iframe/video 즉시 제거해서 백그라운드 재생 방지
    document.getElementById('modal-body').innerHTML = '';
  }

  // ── INIT ──
  async function init() {
    await initAuth();
    await loadAll();
    const savedMode = localStorage.getItem('aiflick_mode');
    if (savedMode === 'flick' || savedMode === 'msg') {
      enterMode(savedMode);
    } else {
      showLanding();
    }
  }
  init();
</script>
</body>
</html>
