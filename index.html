<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIFLICK — flick or msg.</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Orbitron:wght@700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #060608;
      --surface: #0d0d12;
      --card: #11111a;
      --card2: #18181f;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --accent: #a855f7;
      --accent2: #06b6d4;
      --accent3: #f59e0b;
      --glow: rgba(168,85,247,0.4);
      --glow2: rgba(6,182,212,0.4);
      --text: #f1f0ff;
      --muted: #6b6b80;
      --muted2: #9999aa;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 배경 그리드 텍스처 */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(168,85,247,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(168,85,247,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── LANDING BRANCH SCREEN ── */
    #landing-screen {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg);
      display: none;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    #landing-screen.show { display: flex; }
    #landing-screen::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 30% 30%, rgba(168,85,247,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 70% 70%, rgba(6,182,212,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .landing-content {
      position: relative; text-align: center;
      max-width: 600px; width: 100%;
      animation: landingFadeIn 0.6s ease;
    }
    @keyframes landingFadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .landing-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 38px; font-weight: 900; letter-spacing: 6px;
      background: linear-gradient(135deg, #a855f7 0%, #06b6d4 50%, #a855f7 100%);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
      margin-bottom: 56px;
    }
    @keyframes shimmer { to { background-position: 200% center; } }
    .landing-question {
      font-size: 30px; font-weight: 700;
      color: var(--text); margin-bottom: 44px;
      letter-spacing: -0.5px;
    }
    .landing-question .sep {
      color: var(--muted); font-weight: 400; margin: 0 8px;
    }
    .landing-buttons {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
      max-width: 480px; margin: 0 auto;
    }
    .landing-btn {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 36px 20px;
      cursor: pointer;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      font-family: inherit;
      position: relative; overflow: hidden;
    }
    .landing-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(168,85,247,0.10), rgba(6,182,212,0.10));
      opacity: 0; transition: opacity 0.3s;
    }
    .landing-btn:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 12px 36px rgba(0,0,0,0.5), 0 0 28px rgba(168,85,247,0.18);
    }
    .landing-btn:hover::before { opacity: 1; }
    .landing-btn-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 26px; font-weight: 900; letter-spacing: 5px;
      color: var(--text);
      margin-bottom: 12px;
      position: relative;
    }
    .landing-btn-desc {
      font-size: 13px; font-weight: 500;
      color: var(--muted2);
      position: relative;
      line-height: 1.5;
    }
    .landing-remember {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 36px;
      font-size: 13px; color: var(--muted);
      cursor: pointer; user-select: none;
    }
    .landing-remember input { cursor: pointer; accent-color: var(--accent); }
    .landing-tagline {
      margin-top: 14px; font-size: 12px; color: var(--muted);
      letter-spacing: 1px;
    }

    /* ── HEADER (breadcrumb) ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      background: rgba(6,6,8,0.85);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
      display: none;
    }
    header.show { display: block; }

    .header-top {
      padding: 0 20px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }

    .breadcrumb { display: flex; align-items: center; gap: 10px; min-width: 0; }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px; font-weight: 900;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #a855f7 0%, #06b6d4 50%, #a855f7 100%);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none; cursor: pointer;
      animation: shimmer 3s linear infinite;
    }
    .bc-sep { color: var(--muted); font-weight: 300; font-size: 18px; }
    .bc-mode {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: 3px;
      color: var(--text);
      text-transform: uppercase;
    }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .login-btn {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted2); padding: 7px 14px;
      border-radius: 20px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .login-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 10px var(--glow);
    }
    .mode-link { color: var(--muted); border-color: var(--border); font-size: 12px; padding: 6px 12px; }
    .mode-link:hover { color: var(--accent2); border-color: var(--accent2); box-shadow: 0 0 10px var(--glow2); }

    .make-btn {
      background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(6,182,212,0.2));
      border-color: var(--accent);
      color: var(--text);
      font-weight: 700;
    }
    .make-btn:hover {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      box-shadow: 0 0 14px var(--glow);
    }

    .admin-link {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; color: white;
      padding: 6px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 700;
      text-decoration: none; font-family: inherit;
      box-shadow: 0 0 12px var(--glow);
    }

    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid var(--accent); cursor: pointer;
      object-fit: cover;
      box-shadow: 0 0 10px var(--glow);
    }

    .user-menu {
      position: fixed; top: 64px; right: 16px;
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 6px; min-width: 180px; display: none; z-index: 300;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px var(--border);
    }
    .user-menu.show { display: block; }
    .user-menu-item {
      padding: 9px 14px; border-radius: 8px; font-size: 13px;
      cursor: pointer; transition: background 0.15s; color: var(--text);
    }
    .user-menu-item:hover { background: var(--card2); }
    .user-menu-item.danger { color: #f87171; }

    /* MSG 서브탭 */
    .header-sub {
      padding: 0 16px 10px;
      display: none;
      align-items: center; justify-content: space-between;
      gap: 12px;
    }
    .header-sub.show { display: flex; }
    .msg-tabs { display: flex; gap: 6px; }
    .msg-tab-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted2);
      padding: 5px 16px; border-radius: 20px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .msg-tab-btn:hover { border-color: var(--accent); color: var(--accent); }
    .msg-tab-btn.active {
      background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(6,182,212,0.2));
      border-color: var(--accent);
      color: var(--text);
    }
    .msg-meta {
      font-size: 12px; color: var(--muted);
      font-family: 'Space Grotesk', monospace;
    }

    /* ── FLICK MODE (full-screen swipe) ── */
    #flick-wrap {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      overflow-y: scroll; scroll-snap-type: y mandatory;
      scrollbar-width: none; display: none; z-index: 50;
    }
    #flick-wrap::-webkit-scrollbar { display: none; }
    #flick-wrap.active { display: block; }

    .short-item {
      height: 100dvh; width: 100%;
      scroll-snap-align: start;
      position: relative; background: #000; overflow: hidden;
    }
    .short-item iframe {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; border: none;
    }

    .short-item::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 120px;
      background: linear-gradient(rgba(0,0,0,0.6), transparent);
      z-index: 9; pointer-events: none;
    }

    .short-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 16px 72px 80px 16px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      z-index: 10;
    }

    .short-right {
      position: absolute; right: 14px; bottom: 160px;
      display: flex; flex-direction: column; gap: 20px;
      align-items: center; z-index: 10;
    }

    .short-action { display: flex; flex-direction: column; align-items: center; gap: 4px; }

    .short-action-btn {
      width: 46px; height: 46px; border-radius: 50%;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
    }
    .short-action-btn:hover {
      background: rgba(168,85,247,0.3);
      border-color: var(--accent);
      box-shadow: 0 0 14px var(--glow);
      transform: scale(1.08);
    }
    .short-action-btn svg { width: 20px; height: 20px; fill: white; }
    .short-action-btn.liked svg { fill: #f472b6; }

    .short-action-count {
      font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,0.9);
    }

    .short-mode-tag {
      position: absolute; top: 16px; left: 16px; z-index: 11;
      display: flex; align-items: center; gap: 6px;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      cursor: pointer;
    }
    .short-mode-tag .lg {
      font-size: 16px; font-weight: 900; letter-spacing: 3px;
      background: linear-gradient(135deg, #a855f7, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .short-title {
      font-size: 15px; font-weight: 700;
      color: white; margin-bottom: 4px;
      line-height: 1.4;
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    }
    .short-byline {
      font-size: 12px; color: rgba(255,255,255,0.6);
      font-weight: 500;
    }

    /* Guess 슬라이드업 (FLICK 모드 안의 guess 영상) */
    .guess-slideup {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 28px 16px 100px;
      background: linear-gradient(transparent, rgba(0,0,0,0.94));
      transform: translateY(100%);
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 12; pointer-events: none;
    }
    .guess-slideup.show { transform: translateY(0); pointer-events: auto; }
    .guess-slideup-q {
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: 3px;
      color: white; margin-bottom: 14px;
    }
    .guess-slideup-q .accent {
      background: linear-gradient(135deg, #a855f7, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .guess-slideup-btns {
      display: flex; gap: 10px;
      max-width: 360px; margin: 0 auto;
    }
    .guess-slideup-btn {
      flex: 1; padding: 12px 16px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      color: white; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }
    .guess-slideup-btn:hover { transform: translateY(-2px); }
    .guess-slideup-btn.real:hover, .guess-slideup-btn.real.voted {
      background: rgba(168,85,247,0.3);
      border-color: var(--accent);
      box-shadow: 0 0 16px var(--glow);
    }
    .guess-slideup-btn.ai:hover, .guess-slideup-btn.ai.voted {
      background: rgba(6,182,212,0.3);
      border-color: var(--accent2);
      box-shadow: 0 0 16px var(--glow2);
    }
    .guess-slideup-stats {
      display: none; max-width: 360px; margin: 14px auto 0;
      font-size: 12px;
    }
    .guess-slideup-stats.show { display: block; }
    .guess-stats-bar {
      display: flex; height: 4px; background: rgba(255,255,255,0.1);
      border-radius: 2px; overflow: hidden; margin-bottom: 6px;
    }
    .guess-stats-bar > div { transition: width 0.5s ease; }
    .guess-stats-bar .b-real { background: var(--accent); }
    .guess-stats-bar .b-ai { background: var(--accent2); }
    .guess-stats-row {
      display: flex; justify-content: space-between;
      color: rgba(255,255,255,0.8); font-weight: 600;
    }
    .guess-stats-row .real { color: #c084fc; }
    .guess-stats-row .ai { color: #22d3ee; }
    .guess-answer-tag {
      margin-top: 8px; text-align: center;
      font-size: 12px; font-weight: 700;
      color: rgba(255,255,255,0.85);
      font-family: 'Orbitron', sans-serif; letter-spacing: 2px;
    }
    .guess-answer-tag .a { color: #34d399; }

    .short-login-prompt {
      max-width: 360px; margin: 0 auto;
      background: rgba(168,85,247,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(168,85,247,0.3);
      border-radius: 10px; padding: 11px 16px;
      text-align: center; font-size: 13px;
      color: rgba(255,255,255,0.85);
      cursor: pointer; transition: all 0.2s;
      font-weight: 600;
    }
    .short-login-prompt:hover {
      background: rgba(168,85,247,0.25);
      border-color: var(--accent);
    }

    /* ── MSG MODE (Share / Guess grids) ── */
    #msg-wrap { display: none; padding-top: 110px; min-height: 100vh; position: relative; z-index: 1; }
    #msg-wrap.active { display: block; }

    /* ── ME MODE ── */
    #me-wrap { display: none; padding-top: 80px; min-height: 100vh; position: relative; z-index: 1; }
    #me-wrap.active { display: block; }
    .me-container { max-width: 980px; margin: 0 auto; padding: 16px 20px 80px; }

    .profile-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 24px;
      position: relative; overflow: hidden;
    }
    .profile-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(168,85,247,0.06), rgba(6,182,212,0.04));
      pointer-events: none;
    }
    .profile-avatar {
      width: 76px; height: 76px; border-radius: 50%;
      border: 2px solid var(--accent);
      box-shadow: 0 0 16px var(--glow);
      object-fit: cover;
      flex-shrink: 0;
      position: relative;
    }
    .profile-avatar.placeholder {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 26px; font-weight: 900;
      color: white; letter-spacing: 1px;
    }
    .profile-info { flex: 1; min-width: 0; position: relative; }
    .profile-name {
      font-size: 20px; font-weight: 700;
      color: var(--text); margin-bottom: 4px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .profile-email {
      font-size: 12px; color: var(--muted);
      font-family: monospace;
      margin-bottom: 6px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .profile-joined {
      font-size: 11px; color: var(--muted);
      letter-spacing: 1.5px; text-transform: uppercase;
      font-family: 'Orbitron', sans-serif; font-weight: 700;
    }
    .profile-joined .num { color: var(--muted2); font-family: 'Space Grotesk', monospace; letter-spacing: 0; text-transform: none; font-weight: 500; }

    .me-stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
      margin-bottom: 28px;
    }
    .me-stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 14px;
      text-align: center;
    }
    .me-stat-num {
      font-family: 'Orbitron', sans-serif;
      font-size: 26px; font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .me-stat-lbl {
      font-size: 10px; color: var(--muted2);
      margin-top: 8px; letter-spacing: 1.5px; text-transform: uppercase;
      font-weight: 700;
    }

    .me-section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted2);
      margin: 28px 0 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .me-section-title .accent {
      background: linear-gradient(135deg, #a855f7, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .me-empty {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 13px;
      background: var(--card);
      border: 1px dashed var(--border2);
      border-radius: var(--radius);
    }
    .me-empty .emoji { font-size: 36px; margin-bottom: 12px; }

    .me-soon {
      background: var(--card);
      border: 1px dashed var(--border2);
      border-radius: var(--radius-sm);
      padding: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 1px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
    }

    @media (max-width: 540px) {
      .profile-card { flex-direction: column; text-align: center; padding: 24px 18px; }
      .profile-info { width: 100%; }
      .profile-name, .profile-email { white-space: normal; word-break: break-all; }
      .me-stats-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .msg-container { max-width: 1280px; margin: 0 auto; padding: 16px 20px 80px; }

    .empty-state {
      text-align: center; padding: 100px 20px;
      color: var(--muted);
    }
    .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 16px; color: var(--muted2); margin-bottom: 6px; font-weight: 600; }
    .empty-state p { font-size: 13px; line-height: 1.6; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    .post-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      position: relative; cursor: pointer;
      display: flex; flex-direction: column;
    }
    .post-card:hover {
      border-color: rgba(168,85,247,0.35);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 20px rgba(168,85,247,0.12);
    }

    .post-thumb {
      position: relative; width: 100%; padding-bottom: 56.25%;
      background: #000; overflow: hidden;
    }
    .post-thumb img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover;
    }
    .post-thumb .play {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 18px var(--glow);
    }
    .post-thumb .play svg { width: 18px; height: 18px; fill: white; margin-left: 2px; }

    .post-type-tag {
      position: absolute; top: 10px; left: 10px;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      padding: 4px 9px; border-radius: 4px;
      backdrop-filter: blur(10px);
      z-index: 2;
    }
    .post-type-tag.guess { background: rgba(6,182,212,0.85); color: white; }
    .post-type-tag.flick { background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.9); border: 1px solid rgba(255,255,255,0.2); }
    .post-type-tag.talk { background: rgba(168,85,247,0.85); color: white; }

    .post-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .post-title {
      font-size: 14px; font-weight: 700;
      line-height: 1.45; color: var(--text);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post-meta {
      display: flex; align-items: center; gap: 10px;
      font-size: 11px; color: var(--muted);
      font-family: 'Space Grotesk', monospace;
    }
    .post-meta .dot { color: var(--border2); }
    .post-meta .stat svg { width: 11px; height: 11px; fill: var(--muted); vertical-align: -1px; margin-right: 3px; }

    /* Talk 카드 (썸네일 없음) */
    .post-card.talk { background: var(--card); }
    .post-card.talk .talk-headline {
      padding: 44px 18px 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 19px; font-weight: 700; line-height: 1.35;
      color: var(--text);
      letter-spacing: -0.3px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }
    .post-card.talk .talk-preview {
      padding: 0 18px 14px;
      font-size: 13px; color: var(--muted2);
      line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post-card.talk .post-body { padding: 12px 18px 14px; gap: 6px; border-top: 1px solid var(--border); }

    /* ── MODALS ── */
    .post-modal, .login-modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 500; display: none;
      align-items: center; justify-content: center; padding: 20px;
    }
    .post-modal.show, .login-modal.show { display: flex; }

    .modal-content {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      width: 100%; max-width: 720px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(168,85,247,0.1);
    }

    .modal-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card2);
      gap: 12px;
    }
    .modal-title { font-size: 15px; font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .modal-close {
      background: transparent; border: none; color: var(--muted);
      font-size: 24px; cursor: pointer; line-height: 1;
      transition: color 0.2s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 22px; }
    .modal-video {
      width: 100%; position: relative; background: #000;
      border-radius: var(--radius-sm); overflow: hidden;
      margin-bottom: 12px;
    }
    .modal-video.iframe-frame {
      aspect-ratio: 16 / 9;
    }
    .modal-video iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%; border: none;
    }
    .modal-video video {
      display: block;
      width: 100%;
      max-height: 75vh;
      object-fit: contain;
      background: #000;
    }
    .yt-fallback {
      margin: -4px 0 16px;
    }
    .yt-fallback a {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 16px;
      background: rgba(255,0,0,0.08);
      border: 1px solid rgba(255,0,0,0.35);
      border-radius: 10px;
      color: #ff6b6b; font-size: 13px; font-weight: 700;
      text-decoration: none;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }
    .yt-fallback a:hover {
      background: rgba(255,0,0,0.18);
      border-color: #ff6b6b;
      transform: translateY(-1px);
      color: #ff8a8a;
    }
    .yt-fallback-note {
      margin-top: 6px; text-align: center;
      font-size: 11px; color: var(--muted); line-height: 1.5;
    }
    .short-yt-fallback {
      position: absolute; top: 16px; right: 16px; z-index: 13;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.18);
      color: white; font-size: 11px; font-weight: 600;
      padding: 6px 10px; border-radius: 8px;
      text-decoration: none;
      letter-spacing: 0.3px;
      transition: all 0.2s;
    }
    .short-yt-fallback:hover {
      background: rgba(255,0,0,0.7); border-color: rgba(255,0,0,0.8);
    }

    /* 모달 내부 투표 (Guess 영상) */
    .modal-vote {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px; margin-bottom: 16px;
    }
    .modal-vote-label { font-size: 12px; color: var(--muted2); margin-bottom: 10px; font-weight: 700; letter-spacing: 1px; font-family: 'Orbitron', sans-serif; text-align: center; }
    .modal-vote-buttons { display: flex; gap: 8px; }
    .modal-vote-btn {
      flex: 1; padding: 11px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border2);
      background: var(--card);
      color: var(--muted2); font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: all 0.2s;
    }
    .modal-vote-btn:hover { transform: translateY(-1px); }
    .modal-vote-btn.real:hover, .modal-vote-btn.real.voted {
      background: rgba(168,85,247,0.15);
      border-color: var(--accent); color: #c084fc;
      box-shadow: 0 0 12px var(--glow);
    }
    .modal-vote-btn.ai:hover, .modal-vote-btn.ai.voted {
      background: rgba(6,182,212,0.15);
      border-color: var(--accent2); color: #22d3ee;
      box-shadow: 0 0 12px var(--glow2);
    }
    .modal-vote-stats { display: none; margin-top: 12px; }
    .modal-vote-stats.show { display: block; }
    .modal-vote-bar {
      display: flex; height: 6px; border-radius: 3px;
      background: var(--card); overflow: hidden; margin-bottom: 6px;
    }
    .modal-vote-bar .real { background: linear-gradient(90deg, var(--accent), #7c3aed); transition: width 0.5s; }
    .modal-vote-bar .ai { background: linear-gradient(90deg, var(--accent2), #0891b2); transition: width 0.5s; }
    .modal-vote-counts { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; }
    .modal-vote-counts .real { color: #c084fc; }
    .modal-vote-counts .ai { color: #22d3ee; }

    /* 리액션 / 댓글 */
    .reaction-bar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .reaction-btn {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 12px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      color: var(--muted2); transition: all 0.2s;
      font-family: inherit;
    }
    .reaction-btn:hover {
      border-color: var(--accent3); color: var(--text);
      background: rgba(245,158,11,0.1);
      transform: scale(1.06);
    }
    .reaction-btn.reacted { border-color: var(--accent3); color: var(--accent3); }

    .comment-section { border-top: 1px solid var(--border); padding-top: 14px; }
    .comment-preview { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .comment-item { font-size: 13px; color: var(--muted2); line-height: 1.55; }
    .comment-item .nickname { color: var(--text); font-weight: 700; margin-right: 6px; }
    .comment-input-wrap { display: flex; gap: 8px; }

    .comment-input {
      flex: 1;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 14px; font-size: 13px;
      color: var(--text); font-family: inherit;
      outline: none; transition: all 0.2s;
    }
    .comment-input:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(168,85,247,0.2); }
    .comment-input::placeholder { color: var(--muted); }

    .comment-submit {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: var(--radius-sm);
      padding: 9px 16px; color: white;
      font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: all 0.2s;
    }
    .comment-submit:hover { opacity: 0.85; transform: scale(1.02); }

    .login-prompt-inline {
      background: rgba(168,85,247,0.06);
      border: 1px dashed rgba(168,85,247,0.3);
      border-radius: var(--radius-sm); padding: 11px;
      text-align: center; font-size: 13px; font-weight: 600;
      color: var(--muted2); cursor: pointer; transition: all 0.2s;
      margin-bottom: 12px;
    }
    .login-prompt-inline:hover { border-color: var(--accent); color: var(--accent); background: rgba(168,85,247,0.1); }

    /* Talk 본문 (모달) */
    .talk-body-md {
      font-size: 14px; line-height: 1.7; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
    }

    /* ── 로그인 모달 ── */
    .login-modal { z-index: 600; }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 44px 36px; width: 100%; max-width: 380px; text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 40px rgba(168,85,247,0.15);
      position: relative; overflow: hidden;
    }
    .login-box::before {
      content: '';
      position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(ellipse at center, rgba(168,85,247,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .login-logo-big {
      font-family: 'Orbitron', sans-serif;
      font-size: 32px; font-weight: 900; letter-spacing: 4px;
      background: linear-gradient(135deg, #a855f7, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .login-box p { color: var(--muted2); font-size: 14px; margin-bottom: 30px; line-height: 1.7; }

    .google-login-btn {
      width: 100%; background: white; border: none; border-radius: 12px;
      padding: 13px 20px; font-size: 15px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      color: #1a1a1a; transition: all 0.2s; font-family: inherit;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .google-login-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }

    .login-close-btn {
      margin-top: 16px; background: transparent; border: none;
      color: var(--muted); font-size: 13px; cursor: pointer;
      font-family: inherit; transition: color 0.2s;
    }
    .login-close-btn:hover { color: var(--text); }

    /* ── 업로드 모달 ── */
    .make-type-tabs { display: flex; gap: 6px; margin-bottom: 18px; }
    .make-type-tab {
      flex: 1; background: var(--card2);
      border: 1px solid var(--border);
      color: var(--muted2); padding: 10px;
      border-radius: 10px; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
      letter-spacing: 1px;
    }
    .make-type-tab:hover { border-color: var(--accent); color: var(--accent); }
    .make-type-tab.active {
      background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(6,182,212,0.2));
      border-color: var(--accent); color: var(--text);
    }

    .upload-type-btn {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--muted2); padding: 7px 14px;
      border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .upload-type-btn.active {
      background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(6,182,212,0.2));
      border-color: var(--accent); color: var(--text);
    }

    .guess-toggle {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }
    .guess-toggle-row {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--text); font-weight: 600;
      cursor: pointer; user-select: none;
    }
    .guess-toggle-row input { accent-color: var(--accent); cursor: pointer; }
    .guess-toggle-desc { font-size: 11px; color: var(--muted); margin-top: 4px; padding-left: 26px; line-height: 1.5; }
    .guess-answer-row {
      display: none; margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--border);
      align-items: center; gap: 10px;
      font-size: 13px;
    }
    .guess-answer-row.show { display: flex; }
    .guess-answer-row select {
      flex: 1; background: var(--card);
      border: 1px solid var(--border2);
      color: var(--text); padding: 7px 10px;
      border-radius: 8px; font-size: 13px;
      font-family: inherit; cursor: pointer; outline: none;
    }

    .talk-body-input {
      width: 100%; min-height: 180px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px; font-size: 13px;
      color: var(--text); font-family: inherit;
      outline: none; resize: vertical; line-height: 1.6;
      transition: all 0.2s;
    }
    .talk-body-input:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(168,85,247,0.2); }

    /* 커스텀 비디오 컨트롤 */
    .video-controls {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 15;
      padding: 6px 12px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      display: none;
    }
    .video-controls.show { display: block; }
    .video-progress-wrap {
      width: 100%; height: 3px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px; cursor: pointer; margin-bottom: 6px;
    }
    .video-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px; width: 0%; transition: width 0.1s linear;
    }
    .video-ctrl-row { display: flex; align-items: center; gap: 8px; }
    .video-ctrl-btn {
      background: transparent; border: none; cursor: pointer;
      padding: 3px; display: flex; align-items: center;
    }
    .video-ctrl-btn svg { width: 18px; height: 18px; fill: white; }
    .video-time { font-size: 11px; color: rgba(255,255,255,0.8); font-family: monospace; }
    .video-tap-area {
      position: absolute; top: 0; left: 0; right: 70px; bottom: 0;
      z-index: 12; cursor: pointer;
    }

    /* 스크롤바 */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    /* 로딩 */
    .loading { text-align: center; padding: 60px; color: var(--muted); }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes heartPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }
    .heart-pop { animation: heartPop 0.3s ease; }

    @media (max-width: 540px) {
      .header-top { padding: 0 14px; }
      .landing-buttons { grid-template-columns: 1fr; max-width: 320px; }
      .landing-question { font-size: 24px; }
      .landing-logo { font-size: 30px; letter-spacing: 4px; }
      .grid { grid-template-columns: 1fr; gap: 14px; }
      .msg-container { padding: 10px 14px 60px; }
    }
  </style>
</head>
<body>

<!-- ── LANDING BRANCH SCREEN ── -->
<div id="landing-screen" class="show">
  <div class="landing-content">
    <div class="landing-logo">AIFLICK</div>
    <div class="landing-question">flick<span class="sep">or</span>msg?</div>
    <div class="landing-buttons">
      <button class="landing-btn" onclick="enterMode('flick')">
        <div class="landing-btn-label">FLICK</div>
        <div class="landing-btn-desc">스와이프로 가볍게<br>AI 영상 보기</div>
      </button>
      <button class="landing-btn" onclick="enterMode('msg')">
        <div class="landing-btn-label">MSG</div>
        <div class="landing-btn-desc">Make · Share · Guess<br>커뮤니티 참여</div>
      </button>
    </div>
    <label class="landing-remember">
      <input type="checkbox" id="remember-mode"> 다음부턴 자동 진입
    </label>
    <div class="landing-tagline">aiflick — flick or msg.</div>
  </div>
</div>

<!-- ── HEADER ── -->
<header id="main-header">
  <div class="header-top">
    <div class="breadcrumb">
      <a class="logo" onclick="goLanding(event)">AIFLICK</a>
      <span class="bc-sep">/</span>
      <span class="bc-mode" id="bc-mode">flick</span>
    </div>
    <div class="header-right" id="header-right"></div>
  </div>
  <div class="header-sub" id="header-sub">
    <div class="msg-tabs">
      <button class="msg-tab-btn active" data-tab="share" onclick="setMsgTab('share')">Share</button>
      <button class="msg-tab-btn" data-tab="guess" onclick="setMsgTab('guess')">Guess</button>
    </div>
    <button class="login-btn make-btn" onclick="showUploadModal()">+ Make</button>
  </div>
</header>

<div class="user-menu" id="user-menu">
  <div class="user-menu-item" id="user-name-display" style="color:var(--muted);font-size:12px;pointer-events:none;"></div>
  <div class="user-menu-item" onclick="enterMode('me')">내 페이지</div>
  <div class="user-menu-item danger" onclick="doLogout()">로그아웃</div>
</div>

<!-- ── FLICK MODE ── -->
<div id="flick-wrap">
  <div style="height:100dvh;display:flex;align-items:center;justify-content:center;">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<!-- ── MSG MODE ── -->
<div id="msg-wrap">
  <div class="msg-container" id="msg-container">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<!-- ── ME MODE (My Page) ── -->
<div id="me-wrap">
  <div class="me-container" id="me-container">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<!-- 게시물 모달 -->
<div class="post-modal" id="post-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- 업로드 모달 -->
<div class="login-modal" id="upload-modal" onclick="if(event.target===this)closeUploadModal()">
  <div class="login-box" style="max-width:520px;text-align:left;padding:28px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
      <div style="font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#a855f7,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">+ MAKE</div>
      <button onclick="closeUploadModal()" style="background:transparent;border:none;color:var(--muted);font-size:22px;cursor:pointer;">×</button>
    </div>

    <div class="make-type-tabs">
      <button class="make-type-tab active" id="m-tab-video" onclick="setMakeType('video')">영상</button>
      <button class="make-type-tab" id="m-tab-text" onclick="setMakeType('text')">글</button>
    </div>

    <!-- 영상 섹션 -->
    <div id="make-video-section">
      <div style="display:flex;gap:6px;margin-bottom:14px;">
        <button class="upload-type-btn active" id="u-type-youtube" onclick="setUserUploadType('youtube')" style="flex:1;">🔗 YouTube URL</button>
        <button class="upload-type-btn" id="u-type-file" onclick="setUserUploadType('file')" style="flex:1;">📁 파일 업로드</button>
      </div>
      <div id="u-youtube-section">
        <div style="margin-bottom:12px;">
          <label style="font-size:12px;color:var(--muted2);display:block;margin-bottom:5px;font-weight:600;">YouTube URL *</label>
          <input class="comment-input" type="url" id="u-video-url" placeholder="https://www.youtube.com/watch?v=..." style="width:100%;" oninput="previewUserYoutube(this.value)">

        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
